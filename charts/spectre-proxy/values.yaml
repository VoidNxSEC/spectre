# Default values for spectre-proxy
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

## Number of replicas (overridden by HPA if enabled)
replicaCount: 2

## Container image
image:
  repository: ghcr.io/your-org/spectre-proxy
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

## Service Account
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

## Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

## Container Security Context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

## Service configuration
service:
  type: ClusterIP
  port: 80
  annotations: {}

## Ingress configuration
ingress:
  enabled: true
  className: nginx
  # Host for the ingress
  host: spectre.example.com
  annotations: {}
  # TLS configuration
  tls:
    enabled: true
    # cert-manager cluster issuer
    issuer: letsencrypt-prod
  # Rate limiting at ingress level (optional, proxy also has rate limiting)
  rateLimit:
    enabled: false
    rps: 100
    burstMultiplier: 5

## NATS Configuration
nats:
  # URL of the NATS server
  url: "nats://nats.default.svc.cluster.local:4222"

## Upstream service configuration
neutron:
  # URL of the upstream service
  url: "http://neutron.default.svc.cluster.local:8000"

## Rate Limiting (application level)
rateLimit:
  # Requests per second
  rps: 100
  # Burst capacity
  burst: 200

## Observability Configuration
observability:
  # OTLP endpoint for traces (optional)
  otlpEndpoint: ""
  # Sampling rate (0.0 to 1.0)
  # 0.1 = 10% of traces sampled
  samplingRate: "0.1"

## Logging Configuration
logging:
  # Log level (trace, debug, info, warn, error)
  level: info
  # Log format (json or pretty)
  format: json

## Environment (dev, staging, prod)
environment: production

## Metrics Configuration
metrics:
  enabled: true
  port: 9090
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    relabelings: []

## Horizontal Pod Autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  # Scale down stabilization to prevent flapping
  scaleDownStabilizationSeconds: 300

## Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  # Minimum number of pods that must be available
  minAvailable: 1
  # OR maximum number of pods that can be unavailable
  # maxUnavailable: 1

## Pod Anti-Affinity (spread pods across nodes)
podAntiAffinity:
  enabled: true

## Resource requests and limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}

## Secrets
## WARNING: Do not store secrets in values.yaml!
## Use --set secrets.jwtSecret=<secret> or External Secrets Operator
secrets:
  # JWT signing secret (REQUIRED)
  jwtSecret: ""
