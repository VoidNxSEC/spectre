apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spectre-proxy.fullname" . }}
  labels:
    {{- include "spectre-proxy.labels" . | nindent 4 }}
data:
  # NATS Configuration
  NATS_URL: {{ .Values.nats.url | quote }}

  # Upstream Service
  NEUTRON_URL: {{ .Values.neutron.url | quote }}

  # Rate Limiting
  RATE_LIMIT_RPS: {{ .Values.rateLimit.rps | quote }}
  RATE_LIMIT_BURST: {{ .Values.rateLimit.burst | quote }}

  # Observability
  {{- if .Values.observability.otlpEndpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otlpEndpoint | quote }}
  {{- end }}
  OTEL_TRACES_SAMPLER_ARG: {{ .Values.observability.samplingRate | quote }}

  # Logging
  RUST_LOG: {{ .Values.logging.level | quote }}
  SPECTRE_LOG_FORMAT: {{ .Values.logging.format | quote }}
  SPECTRE_ENV: {{ .Values.environment | quote }}

  # TLS (disabled when using Ingress)
  TLS_ENABLED: "false"
