apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "spectre-proxy.fullname" . }}-test-connection"
  labels:
    {{- include "spectre-proxy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
  - name: wget
    image: busybox
    command: ['wget']
    args: ['{{ include "spectre-proxy.fullname" . }}:{{ .Values.service.port }}/health']
  restartPolicy: Never
