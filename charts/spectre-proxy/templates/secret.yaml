apiVersion: v1
kind: Secret
metadata:
  name: {{ include "spectre-proxy.fullname" . }}
  labels:
    {{- include "spectre-proxy.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.jwtSecret }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- else }}
  # WARNING: No JWT secret provided!
  # Set via: --set secrets.jwtSecret=<your-secret>
  # Or use External Secrets Operator in production
  JWT_SECRET: {{ "change-me-in-production" | b64enc | quote }}
  {{- end }}
